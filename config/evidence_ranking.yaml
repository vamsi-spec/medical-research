# Evidence Ranking Configuration
# Adjust weights to prioritize different factors

# Overall weights (must sum to 1.0)
weights:
  study_type: 0.40      # Evidence hierarchy
  recency: 0.30         # Publication date
  sample_size: 0.20     # Study size
  journal: 0.10         # Journal impact

# Study type scores (0.0 to 1.0)
study_types:
  meta_analysis: 1.00
  systematic_review: 0.95
  randomized_controlled_trial: 0.90
  clinical_trial: 0.75
  cohort_study: 0.60
  case_control_study: 0.50
  cross_sectional_study: 0.45
  case_series: 0.30
  case_report: 0.20
  review: 0.40
  expert_opinion: 0.15
  other: 0.25

# Recency decay
recency:
  current_year_score: 1.00
  one_year_old: 0.95
  two_years_old: 0.90
  three_years_old: 0.85
  four_years_old: 0.80
  decay_rate_per_year: 0.07
  minimum_score: 0.35

# Sample size thresholds
sample_size:
  very_large: 10000      # Score: 1.0
  large: 1000            # Score: 0.9
  medium_large: 500      # Score: 0.8
  medium: 100            # Score: 0.6
  small: 50              # Score: 0.4
  very_small: 0          # Score: 0.2
  unknown_score: 0.5

# Evidence levels
evidence_levels:
  level_a:
    study_types:
      - meta_analysis
      - systematic_review
    max_years_old: 3
    min_sample_size: 500
  
  level_b:
    study_types:
      - randomized_controlled_trial
      - clinical_trial
      - cohort_study
    max_years_old: 5
    min_sample_size: 100
  
  # Everything else is Level C
```

